<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard – Solid Roots</title>
<!-- Fallback font Manrope to mimic SST's thin weight -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* Reset */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* Core Variables */
:root {
    --ps-blue: #0070cc;
    --ps-cyan: #1eaedb;
    --ps-black: #000000;
    --ps-white: #ffffff;
    --ps-ice-mist: #f5f7fa;
    --ps-text-ink: #000000;
    --ps-text-charcoal: #1f1f1f;
    --ps-text-gray: #6b6b6b;
    --ps-mute-gray: #cccccc;
    --ps-red: #c81b3a;
    --ps-divider: #f3f3f3;
    --ps-shadow-06: rgba(0, 0, 0, 0.06);
    --ps-shadow-08: rgba(0, 0, 0, 0.08);
}

body {
    font-family: 'SST', 'Manrope', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background-color: var(--ps-black);
    color: var(--ps-text-charcoal);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Typography */
h1, h2, h3 { font-weight: 300; margin: 0; }
.hero-display { font-size: 54px; line-height: 1.25; letter-spacing: -0.1px; color: var(--ps-white); }
.large-display { font-size: 35px; line-height: 1.25; color: var(--ps-text-ink); }
.mid-display { font-size: 28px; line-height: 1.25; letter-spacing: 0.1px; color: var(--ps-text-ink); }
.body-text { font-size: 18px; line-height: 1.5; color: var(--ps-text-charcoal); }
.caption-text { font-size: 14px; line-height: 1.5; color: var(--ps-text-gray); }

/* Buttons */
.btn-primary {
    background-color: var(--ps-blue);
    color: var(--ps-white);
    border: 2px solid transparent; /* Reserve space for border */
    border-radius: 999px;
    padding: 12px 24px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: all 180ms ease;
    outline: none;
    display: inline-block;
    text-align: center;
}
.btn-primary:hover, .btn-primary:focus {
    background-color: var(--ps-cyan);
    border-color: var(--ps-white);
    box-shadow: 0 0 0 2px var(--ps-blue);
    transform: scale(1.2);
}
.btn-primary:active { opacity: 0.6; }

.btn-ghost {
    background: transparent;
    color: var(--ps-white);
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}

.btn-pill {
    background-color: transparent;
    color: var(--ps-text-charcoal);
    border: 1px solid var(--ps-mute-gray);
    border-radius: 999px;
    padding: 8px 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 180ms ease;
}
.btn-pill.active {
    background-color: var(--ps-blue);
    color: var(--ps-white);
    border-color: var(--ps-blue);
}
.btn-pill:hover:not(.active) {
    background-color: var(--ps-ice-mist);
}

/* Forms */
input[type="text"], input[type="password"] {
    background: var(--ps-white);
    border: 1px solid var(--ps-mute-gray);
    border-radius: 3px;
    font-family: inherit;
    font-size: 16px;
    color: var(--ps-text-charcoal);
    padding: 12px 16px;
    transition: box-shadow 180ms ease;
    outline: none;
    width: 100%;
}
input::placeholder { color: rgba(0, 0, 0, 0.6); }
input:focus { box-shadow: 0 0 0 2px var(--ps-blue); }

/* Layout */
.top-nav {
    background-color: var(--ps-black);
    width: 100%;
    padding: 16px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
}
.nav-logo { font-size: 22px; font-weight: 300; color: var(--ps-white); }
.nav-logo span { font-weight: 600; }

.section-dark {
    background: linear-gradient(to bottom, #121314, #000000);
    padding: 96px 48px 160px;
    text-align: center;
}
.section-light {
    background: linear-gradient(to bottom, var(--ps-white), var(--ps-ice-mist));
    padding: 0 48px 96px;
    flex-grow: 1;
}
.footer {
    background-color: var(--ps-blue);
    color: var(--ps-white);
    padding: 48px;
    text-align: center;
    font-size: 12px;
}

.container { max-width: 1280px; margin: 0 auto; }

/* Login */
#login-screen {
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--ps-black);
    padding: 24px;
}
.login-box {
    width: 100%;
    max-width: 400px;
    text-align: center;
}
.login-box h2 { color: var(--ps-white); margin-bottom: 32px; font-size: 35px; }
.login-box .input-group { margin-bottom: 24px; text-align: left; }
.login-error { color: var(--ps-red); font-size: 14px; margin-top: 16px; display: none; }

/* Dashboard Content */
#dashboard { display: none; flex-grow: 1; flex-direction: column; }

.data-card {
    background-color: var(--ps-white);
    border-radius: 24px;
    padding: 48px;
    box-shadow: var(--ps-shadow-06);
    margin-top: -64px;
    position: relative;
    z-index: 10;
}

/* Stats */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 24px;
    margin-bottom: 48px;
}
.stat-item {
    background-color: var(--ps-white);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    box-shadow: var(--ps-shadow-08);
}
.stat-value { font-size: 35px; font-weight: 300; color: var(--ps-text-ink); line-height: 1.25; }
.stat-label { font-size: 14px; font-weight: 500; color: var(--ps-text-gray); margin-top: 8px; }

/* Table Controls */
.toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 24px;
}
.toolbar-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.search-input { max-width: 300px; }

/* Table */
.table-wrapper { overflow-x: auto; margin-bottom: 24px; }
table { width: 100%; border-collapse: collapse; text-align: left; }
th {
    font-size: 14px;
    font-weight: 500;
    color: var(--ps-text-gray);
    padding: 16px 8px;
    border-bottom: 1px solid var(--ps-mute-gray);
}
td {
    font-size: 18px;
    font-weight: 400;
    color: var(--ps-text-charcoal);
    padding: 24px 8px;
    border-bottom: 1px solid var(--ps-divider);
    vertical-align: top;
}
.td-meta { font-size: 14px; color: var(--ps-text-gray); }
.type-tag { font-size: 14px; font-weight: 500; text-transform: capitalize; }
.answers-preview { font-size: 14px; line-height: 1.5; color: var(--ps-text-charcoal); }

/* Pagination */
.pagination { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; }
.pag-buttons { display: flex; gap: 8px; }

/* Modal */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
}
.modal-overlay.active { display: flex; }
.modal-content {
    background: var(--ps-white);
    border-radius: 24px;
    padding: 48px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    box-shadow: var(--ps-shadow-06);
}
.modal-close {
    position: absolute;
    top: 24px;
    right: 24px;
    background: transparent;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--ps-text-gray);
}
.answer-block { margin-bottom: 24px; }
.answer-q { font-size: 14px; font-weight: 500; color: var(--ps-text-gray); margin-bottom: 4px; }
.answer-a { font-size: 18px; color: var(--ps-text-charcoal); }

@media (max-width: 768px) {
    .section-dark { padding: 64px 24px 96px; }
    .section-light { padding: 0 24px 64px; }
    .data-card { padding: 24px; margin-top: -32px; }
    .hero-display { font-size: 35px; }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
    <div class="login-box">
        <h2>Admin Access</h2>
        <div class="input-group">
            <input type="password" id="password-input" placeholder="Enter admin password"/>
        </div>
        <button class="btn-primary" id="login-btn" style="width: 100%;">Sign In</button>
        <div class="login-error" id="login-error">Incorrect password.</div>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
    <nav class="top-nav">
        <div class="nav-logo">Solid <span>Roots</span></div>
        <button class="btn-ghost" id="logout-btn">Sign Out</button>
    </nav>

    <div class="section-dark">
        <div class="container">
            <h1 class="hero-display">Inquiries Overview</h1>
        </div>
    </div>

    <div class="section-light">
        <div class="container">
            <div class="data-card">
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-total">-</div>
                        <div class="stat-label">Total Inquiries</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-buy">-</div>
                        <div class="stat-label">Buy Requests</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-sell">-</div>
                        <div class="stat-label">Sell Requests</div>
                    </div>
                </div>

                <div class="toolbar">
                    <div class="toolbar-left">
                        <input type="text" id="search-input" class="search-input" placeholder="Search email, phone..."/>
                        <button class="btn-pill active" data-type="all">All</button>
                        <button class="btn-pill" data-type="buy">Buy</button>
                        <button class="btn-pill" data-type="sell">Sell</button>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-primary" id="csv-buy-btn" style="padding: 8px 16px; font-size: 14px; background:var(--ps-blue);">⬇ Buy CSV</button>
                        <button class="btn-primary" id="csv-sell-btn" style="padding: 8px 16px; font-size: 14px; background:var(--ps-text-charcoal);">⬇ Sell CSV</button>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Contact</th>
                                <th>Submission Details</th>
                                <th>Date</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr><td colspan="5" class="td-small" style="text-align:center;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination">
                    <div class="caption-text" id="pag-info">Showing - records</div>
                    <div class="pag-buttons">
                        <button class="btn-pill" id="prev-btn" disabled>Prev</button>
                        <button class="btn-pill" id="next-btn" disabled>Next</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
    
    <footer class="footer">
        © 2026 Solid Roots. Secure Admin Portal.
    </footer>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-bg">
    <div class="modal-content">
        <button class="modal-close" id="modal-close">&times;</button>
        <h2 class="mid-display" style="margin-bottom: 32px;" id="modal-title">Inquiry Details</h2>
        <div id="modal-body"></div>
    </div>
</div>

<script>
let adminKey = "";
let allData = [];
let filtered = [];
let currentPage = 1;
const PAGE_SIZE = 10;
let currentType = "all";

// Elements
const loginScreen = document.getElementById("login-screen");
const dashboard = document.getElementById("dashboard");
const loginBtn = document.getElementById("login-btn");
const pwInput = document.getElementById("password-input");
const errorMsg = document.getElementById("login-error");
const tbody = document.getElementById("table-body");

// Login
loginBtn.addEventListener("click", attemptLogin);
pwInput.addEventListener("keydown", e => { if (e.key === "Enter") attemptLogin(); });

async function attemptLogin() {
    const pw = pwInput.value.trim();
    if (!pw) return;
    
    loginBtn.textContent = "Verifying...";
    try {
        const res = await fetch(`/api/admin?key=${encodeURIComponent(pw)}&pageSize=1`);
        if (res.ok) {
            adminKey = pw;
            loginScreen.style.display = "none";
            dashboard.style.display = "flex";
            loadData();
        } else {
            errorMsg.style.display = "block";
        }
    } catch (e) {
        errorMsg.textContent = "Connection error.";
        errorMsg.style.display = "block";
    }
    loginBtn.textContent = "Sign In";
}

document.getElementById("logout-btn").addEventListener("click", () => {
    adminKey = "";
    pwInput.value = "";
    dashboard.style.display = "none";
    loginScreen.style.display = "flex";
});

// Data
async function loadData() {
    try {
        const res = await fetch(`/api/admin?key=${encodeURIComponent(adminKey)}&pageSize=1000`);
        const json = await res.json();
        allData = json.data || [];
        updateStats();
        applyFilter();
    } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5" class="td-small">Failed to load data.</td></tr>`;
    }
}

function updateStats() {
    document.getElementById("stat-total").textContent = allData.length;
    document.getElementById("stat-buy").textContent = allData.filter(d => d.type === 'buy').length;
    document.getElementById("stat-sell").textContent = allData.filter(d => d.type === 'sell').length;
}

function applyFilter() {
    const q = document.getElementById("search-input").value.toLowerCase();
    filtered = allData.filter(r => {
        const typeMatch = currentType === "all" || r.type === currentType;
        const qMatch = !q || (r.email || "").toLowerCase().includes(q) || (r.phone || "").includes(q) || (r.answers || "").toLowerCase().includes(q);
        return typeMatch && qMatch;
    });
    currentPage = 1;
    renderTable();
}

function renderTable() {
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageData = filtered.slice(start, start + PAGE_SIZE);

    if (pageData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="td-small" style="text-align:center;">No records found.</td></tr>`;
        document.getElementById("pag-info").textContent = "No records";
        document.getElementById("prev-btn").disabled = true;
        document.getElementById("next-btn").disabled = true;
        return;
    }

    tbody.innerHTML = pageData.map(row => {
        const date = row.created_at ? new Date(row.created_at).toLocaleDateString() : "-";
        let answersPreview = "No details";
        try {
            const ans = JSON.parse(row.answers);
            if(Array.isArray(ans) && ans.length > 0) answersPreview = ans[0];
            else if (typeof ans === 'object') answersPreview = Object.values(ans)[0] || "";
        } catch(e) {}

        return `<tr>
            <td><span class="type-tag" style="color: ${row.type === 'buy' ? 'var(--ps-blue)' : 'var(--ps-text-ink)'}">${row.type}</span></td>
            <td>
                <div class="body-text">${esc(row.email || "-")}</div>
                <div class="td-meta">${esc(row.phone || "-")}</div>
            </td>
            <td class="answers-preview">${esc(answersPreview)}...</td>
            <td class="td-meta">${date}</td>
            <td><button class="btn-pill" onclick="openModal(${row.id})">View</button></td>
        </tr>`;
    }).join("");

    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    document.getElementById("pag-info").textContent = `Showing ${start + 1}-${Math.min(start + PAGE_SIZE, filtered.length)} of ${filtered.length}`;
    document.getElementById("prev-btn").disabled = currentPage === 1;
    document.getElementById("next-btn").disabled = currentPage >= totalPages;
}

// Modal
function openModal(id) {
    const row = allData.find(r => r.id === id);
    if (!row) return;
    
    document.getElementById("modal-title").textContent = `Inquiry: ${row.type.toUpperCase()}`;
    
    let answersHtml = "";
    try {
        const ans = JSON.parse(row.answers);
        if (Array.isArray(ans)) {
            answersHtml = ans.map((a,i) => `<div class="answer-block"><div class="answer-q">Response ${i+1}</div><div class="answer-a">${esc(a)}</div></div>`).join("");
        } else {
            answersHtml = Object.entries(ans).map(([q, a]) => `<div class="answer-block"><div class="answer-q">${esc(q)}</div><div class="answer-a">${esc(a)}</div></div>`).join("");
        }
    } catch(e) {
        answersHtml = `<div class="answer-block"><div class="answer-a">${esc(row.answers)}</div></div>`;
    }

    document.getElementById("modal-body").innerHTML = `
        <div style="margin-bottom: 32px;">
            <div class="answer-q">Contact Info</div>
            <div class="body-text">${esc(row.email || "-")}</div>
            <div class="body-text">${esc(row.phone || "-")}</div>
        </div>
        <div>${answersHtml}</div>
    `;
    document.getElementById("modal-bg").classList.add("active");
}

document.getElementById("modal-close").addEventListener("click", () => document.getElementById("modal-bg").classList.remove("active"));
document.getElementById("modal-bg").addEventListener("click", e => { if(e.target.id === "modal-bg") document.getElementById("modal-bg").classList.remove("active"); });

// Filters
document.querySelectorAll(".toolbar-left .btn-pill").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".toolbar-left .btn-pill").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentType = btn.dataset.type;
        applyFilter();
    });
});

let searchTimer;
document.getElementById("search-input").addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFilter, 300);
});

// Pagination
document.getElementById("prev-btn").addEventListener("click", () => { if(currentPage > 1) { currentPage--; renderTable(); } });
document.getElementById("next-btn").addEventListener("click", () => { currentPage++; renderTable(); });

// CSV — shared helper
function forceText(val) {
    return `\t${val}`; // Tab prefix: forces Excel/Sheets to treat as text, not number
}

function generateCSV(type) {
    // 1. Filter to only this type's rows (from ALL data, not just current filter)
    const typeRows = allData.filter(r => r.type === type);
    if (typeRows.length === 0) {
        alert(`No ${type} inquiries found.`);
        return;
    }

    // 2. Parse answers and collect only columns relevant to this type
    const questionKeys = new Set();
    const parsedRowsData = typeRows.map(r => {
        let parsedAnswers = {};
        try {
            const ansObj = JSON.parse(r.answers);
            if (typeof ansObj === 'object' && ansObj !== null && !Array.isArray(ansObj)) {
                parsedAnswers = ansObj;
                Object.keys(ansObj).forEach(k => questionKeys.add(k));
            } else if (Array.isArray(ansObj)) {
                ansObj.forEach((a, i) => {
                    const key = `Response ${i+1}`;
                    parsedAnswers[key] = a;
                    questionKeys.add(key);
                });
            } else if (r.answers) {
                parsedAnswers["Raw Answer"] = r.answers;
                questionKeys.add("Raw Answer");
            }
        } catch(e) {
            if (r.answers) {
                parsedAnswers["Raw Answer"] = r.answers;
                questionKeys.add("Raw Answer");
            }
        }
        return { ...r, parsedAnswers };
    });

    const questionsArray = Array.from(questionKeys);

    // 3. Build header row — base columns + only THIS type's questions
    const rows = [["ID", "Email", "Phone", "Date", ...questionsArray]];

    // 4. Build data rows
    parsedRowsData.forEach(r => {
        const row = [
            forceText(r.id),
            r.email || "",
            forceText(r.phone || ""),
            r.created_at || ""
        ];
        questionsArray.forEach(q => {
            row.push(r.parsedAnswers[q] !== undefined ? r.parsedAnswers[q] : "");
        });
        rows.push(row);
    });

    // 5. Download
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `solidroots-${type}-inquiries-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

document.getElementById("csv-buy-btn").addEventListener("click", () => generateCSV("buy"));
document.getElementById("csv-sell-btn").addEventListener("click", () => generateCSV("sell"));

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
</html>
